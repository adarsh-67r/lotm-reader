name: Discord Discussion Bridge

on:
  discussion_comment:
    types: [created]

permissions:
  discussions: write
  contents: read

jobs:
  notify-and-sanitize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests better_profanity

      - name: Run Bridge Script
        env:
          DISCORD_MAIN: ${{ secrets.DISCORD_MAIN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/discussion.py