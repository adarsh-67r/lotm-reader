name: Build & Deploy Website

on:
  schedule:
    - cron: '0 0 1,15 * *'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: windows-latest
    permissions:
      contents: read
      deployments: write
    env:
      PYTHONUTF8: 1

    steps:
      # 1. Checkout Code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # 3. Install Python Dependencies
      - name: Install Python dependencies
        run: |
          pip install python-frontmatter imagesize

      # 4. Install Pandoc (Required by html.py)
      - name: Install Pandoc
        run: choco install pandoc --no-progress

      # 5. Copy Images to Static Folder
      - name: Sync Images to Static
        run: |
          mkdir website\static\assets\images -Force
          xcopy images\* website\static\assets\images\ /E /I /Y
        
      # 6. Run HTML Builder Script
      - name: Generate Svelte Pages
        run: python scripts/build_web.py

      # 7. Setup Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      # 8. Install NPM Dependencies
      - name: Install Node dependencies
        working-directory: ./website
        run: npm ci

      # 9. Build SvelteKit Site
      - name: Build Website
        working-directory: ./website
        run: npm run build

      # 10. Deploy to Cloudflare Pages
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./website/build/ --project-name=beyonder
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}